services:
  redis:
    image: redis:alpine
    container_name: flowdesk-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - flowdesk-net

  backend:
    build: ./backend
    container_name: flowdesk-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - flowdesk-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowdesk-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - flowdesk-net

networks:
  flowdesk-net:
    driver: bridge