services:
  backend:
    build: ./backend
    container_name: flowdesk-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - flowdesk-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowdesk-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - flowdesk-net

networks:
  flowdesk-net:
    driver: bridge